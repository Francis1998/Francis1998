name: Update GitHub Totals

on:
  schedule:
    - cron: "0 3 * * *"
      timezone: America/Los_Angeles
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-github-totals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip matplotlib requests

      - name: Generate totals and weekly stars chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_total_stars_graph.py \
            --user Francis1998 \
            --weeks 9 \
            --weekly-output assets/weekly-stars-last-9-weeks.svg \
            --metrics-output assets/github-totals.svg

      - name: Commit and push changes
        run: |
          git config user.name "Francis1998"
          git config user.email "Francis1998@users.noreply.github.com"

          if git diff --quiet -- assets/github-totals.svg assets/weekly-stars-last-9-weeks.svg; then
            echo "No chart changes to commit."
            exit 0
          fi

          git add assets/github-totals.svg assets/weekly-stars-last-9-weeks.svg
          git commit -m "Update GitHub totals and weekly stars chart"
          git push
