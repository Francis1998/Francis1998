name: Update Total Stars Graph

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stars-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip matplotlib requests

      - name: Generate graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_total_stars_graph.py \
            --user Francis1998 \
            --months 6 \
            --output assets/total-stars-last-6-months.svg

      - name: Commit and push changes
        run: |
          if git diff --quiet -- assets/total-stars-last-6-months.svg; then
            echo "No graph changes to commit."
            exit 0
          fi

          git add assets/total-stars-last-6-months.svg
          git commit -m "Update total stars graph"
          git push
