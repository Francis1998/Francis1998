name: Update Total Stars Graph

on:
  schedule:
    - cron: "0 3 * * *"
      timezone: America/Los_Angeles
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stars-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip matplotlib requests

      - name: Generate graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_total_stars_graph.py \
            --user Francis1998 \
            --months 6 \
            --output assets/total-stars-last-6-months.svg \
            --metrics-output assets/github-totals.svg

      - name: Commit and push changes
        run: |
          git config user.name "Francis1998"
          git config user.email "Francis1998@users.noreply.github.com"

          if git diff --quiet -- assets/total-stars-last-6-months.svg assets/github-totals.svg; then
            echo "No graph changes to commit."
            exit 0
          fi

          git add assets/total-stars-last-6-months.svg assets/github-totals.svg
          git commit -m "Update total stars graph"
          git push
